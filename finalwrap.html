    body {

    /* Cinematic timing curves */

    .play .rv-d4 { transition-delay: 850ms; }
    .play .rv-d5 { transition-delay: 1100ms; }
    .play .rv-d6 { transition-delay: 1350ms; }
    .play .rv-d7 { transition-delay: 1600ms; }

    .rv-scale { opacity: 0; transform: scale(.94); transition: opacity 1100ms var(--ease-out-expo), transform 1300ms var(--ease-out-expo); }

    /* Aurora background */

// ── Hooks ────────────────────────────────────────────────────────
function useCounter(target, active, duration = 2200) {
  const [value, setValue] = useState(0);
  const startRef = useRef(0); const rafRef = useRef(0);
  useEffect(() => {
    if (!active) { setValue(0); return; }
    startRef.current = 0;
    const step = (t) => {
      if (!startRef.current) startRef.current = t;
      const p = Math.min(1, (t - startRef.current) / duration);
      const eased = p === 1 ? 1 : 1 - Math.pow(2, -10 * p);
      setValue(Math.round(target * eased));
      if (p < 1) rafRef.current = requestAnimationFrame(step);
    };
    rafRef.current = requestAnimationFrame(step);
    return () => cancelAnimationFrame(rafRef.current);
  }, [target, active, duration]);
  return value;
}

function useTypeOn(text, active, speed = 22, startDelay = 0) {
  const [out, setOut] = useState("");
  useEffect(() => {
    if (!active) { setOut(""); return; }
    let i = 0; let t1, t2;
    t1 = setTimeout(() => {
      t2 = setInterval(() => {
        i++; setOut(text.slice(0, i));
        if (i >= text.length) clearInterval(t2);
      }, speed);
    }, startDelay);
    return () => { clearTimeout(t1); clearInterval(t2); };
  }, [text, active, speed, startDelay]);
  return out;
}

              <strong style={{ color: "#fff" }}>{studentName}, you're in a genuinely strong position.</strong> Your 3.85 GPA with very high rigor and a 1420 SAT place you comfortably in admit range for most targets and competitively for several reach schools. Your <strong style={{ color: "#fff" }}>biggest lever is your SAT</strong> — a +70 lift would shift three reach schools to target. Essays are ahead of schedule, but only 4 of 12 applications are started — prioritize 2–3 more by month-end. <strong style={{ color: "#fff" }}>Stay consistent, push your SAT, finish applications one at a time.</strong>
            </div>
          </div>

          {/* Footer */}
          <div className="rv rv-d6 mt-8 flex items-center justify-between flex-wrap gap-3" style={{ paddingTop: 16, borderTop: "1px solid rgba(255,255,255,.06)" }}>
            <div className="micro" style={{ color: "rgba(203,213,245,.4)" }}>
              Generated by LaunchPath AI · April 25, 2026
            </div>
            <div className="flex gap-2">
              <button className="pill">Schedule with counselor</button>
              <button className="pill pill-primary">Return to workspace →</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

// ── Master controller ───────────────────────────────────────────
function PresentationMode() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const accent = ACCENTS[t.accent] || ACCENTS.cyan;
  useEffect(() => {
    document.documentElement.style.setProperty("--accent-1", accent.a1);
    document.documentElement.style.setProperty("--accent-2", accent.a2);
  }, [accent]);

  const scenes = useMemo(() => buildScenes(), []);
  const speed = t.speed || 1;

  const [sceneIdx, setSceneIdx] = useState(0);
  const [elapsed, setElapsed] = useState(0);
  const [playing, setPlaying] = useState(t.autoPlay);
  const lastTickRef = useRef(performance.now());
  const rafRef = useRef(0);

  useEffect(() => { setPlaying(t.autoPlay); }, [t.autoPlay]);

  useEffect(() => {
    if (!playing) return;
    lastTickRef.current = performance.now();
    const tick = (now) => {
      const dt = (now - lastTickRef.current) * speed;
      lastTickRef.current = now;
      setElapsed((prev) => {
        const cur = scenes[sceneIdx];
        const next = prev + dt;
        if (next >= cur.dur && sceneIdx < scenes.length - 1) {
          setSceneIdx((s) => Math.min(scenes.length - 1, s + 1));
          return 0;
        }
        return Math.min(next, cur.dur);
      });
      rafRef.current = requestAnimationFrame(tick);
    };
    rafRef.current = requestAnimationFrame(tick);
    return () => cancelAnimationFrame(rafRef.current);
  }, [playing, sceneIdx, scenes, speed]);

  const totalDur = scenes.slice(0, -1).reduce((a, s) => a + s.dur, 0);
  const progressMs = scenes.slice(0, sceneIdx).reduce((a, s) => a + s.dur, 0) + Math.min(elapsed, scenes[sceneIdx]?.dur ?? 0);
  const progressPct = sceneIdx >= scenes.length - 1 ? 100 : (progressMs / totalDur) * 100;

  const goTo = useCallback((i) => {
    setSceneIdx(Math.max(0, Math.min(scenes.length - 1, i)));
    setElapsed(0);
  }, [scenes.length]);
  const next = useCallback(() => goTo(sceneIdx + 1), [goTo, sceneIdx]);
  const prev = useCallback(() => goTo(sceneIdx - 1), [goTo, sceneIdx]);
  const replay = useCallback(() => { setSceneIdx(0); setElapsed(0); setPlaying(true); }, []);

  useEffect(() => {
    const onKey = (e) => {
      if (e.key === "ArrowRight" || e.key === " ") { e.preventDefault(); next(); }
      else if (e.key === "ArrowLeft") { e.preventDefault(); prev(); }
      else if (e.key === "Escape") setPlaying(false);
      else if (e.key === "r" || e.key === "R") replay();
    };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [next, prev, replay]);

  const isFinal = sceneIdx === scenes.length - 1;
  const studentName = t.studentName || "Ava";
  const totalSec = Math.round(totalDur / 1000);

  return (
    <div className="relative w-full h-full overflow-hidden">
      <Background variant={t.variant} />

      <div className="topbar">
        <div className="flex items-center gap-3">
          <a href="index.html" className="pill" style={{ background: "rgba(15,23,42,.4)", textDecoration: "none" }}>← Home</a>
          <div className="pill flex items-center gap-3" style={{ background: "rgba(15,23,42,.4)" }}>
            <BrandMark size={18} />
            <span className="micro" style={{ color: "rgba(203,213,245,.85)" }}>Final Wrap</span>
            <span style={{ width: 1, height: 10, background: "rgba(255,255,255,.15)" }} />
            <span className="micro tabular-nums" style={{ color: "rgba(203,213,245,.55)" }}>
              {String(sceneIdx + 1).padStart(2,"0")} / {String(scenes.length).padStart(2,"0")}
            </span>
          </div>
        </div>
        <button className="pill" onClick={() => goTo(scenes.length - 1)}>Skip to summary →</button>
      </div>

      <div className="absolute inset-0">
        <ScenePreflight  active={sceneIdx === 0} />
        <SceneHero       active={sceneIdx === 1} score={t.score} studentName={studentName} />
        <SceneTier       active={sceneIdx === 2} score={t.score} />
        <ScenePillars    active={sceneIdx === 3} />
        <ScenePercentile active={sceneIdx === 4} studentName={studentName} />
        <SceneMatches    active={sceneIdx === 5} />
        <SceneProgress   active={sceneIdx === 6} />
        <SceneWhatIf     active={sceneIdx === 7} />
        <SceneLever      active={sceneIdx === 8} />
        <SceneInsight    active={sceneIdx === 9} studentName={studentName} />
        <SceneExec       active={sceneIdx === 10} studentName={studentName} score={t.score} onReplay={replay} />
      </div>

      <div className={`chrome ${isFinal ? "hidden" : ""}`}>
        <button className="pill" style={{ width: 40, padding: 0, height: 36, display: "grid", placeItems: "center" }} onClick={() => setPlaying(p => !p)} aria-label={playing ? "Pause" : "Play"}>
          {playing ? (
            <svg width="10" height="12" viewBox="0 0 10 12"><rect x="0" y="0" width="3" height="12" fill="currentColor"/><rect x="7" y="0" width="3" height="12" fill="currentColor"/></svg>
          ) : (
            <svg width="10" height="12" viewBox="0 0 10 12"><path d="M0 0L10 6L0 12V0Z" fill="currentColor"/></svg>
          )}
        </button>
        <button className="pill" style={{ padding: "0 10px", height: 36 }} onClick={prev}>←</button>
        <div className="scrub" onClick={(e) => {
          const r = e.currentTarget.getBoundingClientRect();
          const pct = (e.clientX - r.left) / r.width;
          const target = pct * totalDur;
          let acc = 0, i = 0;
          for (; i < scenes.length - 1; i++) {
            if (acc + scenes[i].dur > target) break;
            acc += scenes[i].dur;
          }
          setSceneIdx(i); setElapsed(target - acc);
        }}>
          <div className="scrub-fill" style={{ width: `${progressPct}%` }} />
          {scenes.slice(1, -1).map((s, i) => {
            const accSum = scenes.slice(0, i + 1).reduce((a, x) => a + x.dur, 0);
            return <div key={i} className="scrub-marker" style={{ left: `${(accSum / totalDur) * 100}%` }} />;
          })}
        </div>
        <button className="pill" style={{ padding: "0 10px", height: 36 }} onClick={next}>→</button>
        <span className="micro tabular-nums ml-2" style={{ color: "rgba(203,213,245,.55)", minWidth: 76, textAlign: "right" }}>
          {Math.floor(progressMs / 1000).toString().padStart(2, "0")}s / {totalSec}s · {scenes[sceneIdx]?.label}
        </span>
      </div>

      <TweaksPanel title="Tweaks">
        <TweakSection label="Variant" />
        <TweakRadio label="Background" value={t.variant} options={["aurora", "starfield", "grid"]} onChange={(v) => setTweak("variant", v)} />
        <TweakRadio label="Accent" value={t.accent} options={["cyan", "violet", "amber"]} onChange={(v) => setTweak("accent", v)} />

        <TweakSection label="Content" />
        <TweakSlider label="Score" value={t.score} min={0} max={100} step={1} onChange={(v) => setTweak("score", v)} />
        <TweakText label="Student" value={t.studentName} onChange={(v) => setTweak("studentName", v)} />

        <TweakSection label="Playback" />
        <TweakToggle label="Auto-play" value={t.autoPlay} onChange={(v) => setTweak("autoPlay", v)} />
        <TweakSlider label="Speed" value={t.speed} min={0.5} max={2} step={0.25} unit="×" onChange={(v) => setTweak("speed", v)} />
        <TweakButton label="Replay from start" onClick={replay} />
        <TweakButton label="Jump to summary" onClick={() => goTo(scenes.length - 1)} />
      </TweaksPanel>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<PresentationMode />);
</script>
</body></html>
